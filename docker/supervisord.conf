[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log
priority=10

[program:poll-agent]
command=/app/poll-and-deploy.sh
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/poll-agent.err.log
stdout_logfile=/var/log/supervisor/poll-agent.out.log
environment=GITHUB_OWNER=%(ENV_GITHUB_OWNER)s,GITHUB_REPO=%(ENV_GITHUB_REPO)s,GITHUB_TOKEN=%(ENV_GITHUB_TOKEN)s,WORKFLOW_FILE=%(ENV_WORKFLOW_FILE)s,ARTIFACT_NAME=%(ENV_ARTIFACT_NAME)s,BRANCH=%(ENV_BRANCH)s,POLL_INTERVAL_SECONDS=%(ENV_POLL_INTERVAL_SECONDS)s,SITE_DIR=/site,STATE_DIR=/state,WORK_DIR=/tmp/work
priority=20
