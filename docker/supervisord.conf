[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log
priority=10

[program:poll-agent]
command=/bin/sh -c "exec /app/poll-and-deploy.sh"
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/poll-agent.err.log
stdout_logfile=/var/log/supervisor/poll-agent.out.log
priority=20
