server {
    listen 8069 default_server;
    listen [::]:8069 default_server;
    server_name log.meany.xyz localhost 127.0.0.1 _;

    root /site;
    index index.html;

    # Redirect common non-canonical host variations in production.
    if ($host = www.log.meany.xyz) {
        return 308 https://log.meany.xyz$request_uri;
    }

    if ($host = meany.xyz) {
        return 308 https://log.meany.xyz$request_uri;
    }

    if ($host = www.meany.xyz) {
        return 308 https://log.meany.xyz$request_uri;
    }

    # Normalize direct index.html requests to directory-style canonicals.
    location = /index.html {
        return 308 /;
    }

    rewrite ^/(.+)/index\.html$ /$1/ permanent;

    # Directory-style URLs: /entries/slug/ → /entries/slug/index.html
    try_files $uri $uri/ =404;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Set content type for Atom feed
    location = /feed.xml {
        add_header Content-Type "application/atom+xml; charset=utf-8";
    }

    # No caching for HTML (entries change frequently)
    location ~* \.html?$ {
        add_header Cache-Control "public, must-revalidate, max-age=300";
    }
}
